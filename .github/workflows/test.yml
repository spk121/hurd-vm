
name: Test

on:
  workflow_dispatch:
  release:
    types: [ published ]
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/test.yml'
      - 'index.js'
      - 'conf/*'
      - 'hooks/*'



concurrency: 
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  testsshfs:
    strategy:
      fail-fast: false
      matrix:
        release: [ "trixie", "bookworm", "sid", ""]
        runs: [ "ubuntu-24.04"]

    runs-on: ${{ matrix.runs }}
    name: sshfs Debian GNU/Hurd
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      DEBUG: 1
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Check release
      id: check
      run: |
        _release="${{ matrix.release }}"
        if [ -z "$_release" ]; then
          . conf/default.release.conf
          _release="$DEFAULT_RELEASE"
        fi

        if [ -e "conf/${_release}.conf" ]; then
          echo "conf exists: conf/${_release}.conf"
          echo "run=true" >> $GITHUB_OUTPUT
        else
          echo "The release ${_release} is not supported, skip."
          echo "run=false" >> $GITHUB_OUTPUT
        fi

    - name: Test in Debian GNU/Hurd
      if: ${{ steps.check.outputs.run == 'true' }}
      id: test
      uses: ${{ github.repository }}@f4762c2c7d95eaf938a812392af526cefe0369a7
      with:
        envs: 'DEBUG MYTOKEN MYTOKEN2'
        prepare: |
          
        mem: 4096
        release: ${{ matrix.release }}
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        usesh: true
        debug: true
        sync: sshfs
        run: |
          set -e
          ls -lah $HOME/work
          if [ -z "$(ls -A $HOME/work)" ]; then
            echo "sshfs error."
            exit 1
          fi
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          echo "textfromvm" >$GITHUB_WORKSPACE/vm.txt
          uname -a
          lsb_release -a 2>/dev/null || echo 'lsb_release not available'
          ls -lah
          whoami
          env
          nproc
          free -h

    - name: Test NAT
      if: ${{ steps.check.outputs.run == 'true' }}
      env:
        VM_USER: ""
      run: |
        set -e
        echo "TEST_ENV=$TEST_ENV"
        [ "$TEST_ENV" = "abc" ]
        ssh -v -p 20022 ${VM_USER:-root}@localhost  "uname -a;whoami;pwd"
    - name: Test custom shell
      if: ${{ steps.check.outputs.run == 'true' }}
      shell: hurd {0}
      run: |
        pwd
        uname -a
        ls -lah
        whoami
        env
        nproc
        free -h




