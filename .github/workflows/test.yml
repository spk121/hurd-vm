name: Test

on:
  workflow_dispatch:
  release:
    types: [ published ]
  push:
    branches:
      - '*'
    paths:
      - '**.sh'
      - '.github/workflows/test.yml'
      - 'index.js'
      - 'conf/*'
      - 'hooks/*'



concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true



jobs:
  test-rsync:
    runs-on: ubuntu-24.04
    name: rsync default Debian GNU/Hurd
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Test in Debian GNU/Hurd
      id: test
      uses: ./
      with:
        envs: 'MYTOKEN MYTOKEN2'
        prepare: |
          
        mem: 2048
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        debug: true
        run: |
          env
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          uname -a
          ls -lah
          whoami
          env
          nproc
          free -h

    - name: Test NAT
      env:
        VM_USER: ""
      run: |
        set -e
        echo "TEST_ENV=$TEST_ENV"
        [ "$TEST_ENV" = "abc" ]
        ssh \
          -v \
          -o BatchMode=yes \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -i "$HOME/.ssh/hurd_vm_key" \
          -p 20022 \
          ${VM_USER:-root}@localhost \
          "uname -a;whoami;pwd"

    - name: Test custom shell
      shell: hurd {0}
      run: |
        pwd
        uname -a
        ls -lah
        whoami
        env
        nproc
        free -h


  test-scp:
    needs: test-rsync
    runs-on: ubuntu-24.04
    name: scp Debian GNU/Hurd
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      DEBUG: 1
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Test in Debian GNU/Hurd
      id: test
      uses: ./
      with:
        envs: 'DEBUG MYTOKEN MYTOKEN2'
        prepare: |
          
        mem: 2048
        nat: |
          "20022": "22"
          "8080": "80"
          "8443": "443"
          udp:"8081": "80"
        debug: true
        sync: scp
        run: |
          ls -lah $HOME/work
          if [ -z "$(ls -A $HOME/work)" ]; then
            echo "scp error."
            exit 1
          fi
          env
          echo "TEST_ENV=abc" >>${GITHUB_ENV}
          echo "textfromvm" >$GITHUB_WORKSPACE/vm.txt
          uname -a
          ls -lah
          whoami
          env
          nproc
          free -h

    - name: Test files
      run: |
        set -e
        [ -e "$GITHUB_WORKSPACE/vm.txt" ];
        cat "$GITHUB_WORKSPACE/vm.txt";
        grep "textfromvm" $GITHUB_WORKSPACE/vm.txt;
        cat ${GITHUB_ENV}
        echo "TEST_ENV=$TEST_ENV";
        [ "$TEST_ENV" = "abc" ];


  test-error:
    needs: test-rsync
    runs-on: ubuntu-24.04
    name: test error handling Debian GNU/Hurd
    steps:
    - uses: actions/checkout@v6
    - name: Test in Debian GNU/Hurd
      id: testerr
      continue-on-error: true
      uses: ./
      with:
        debug: true
        run: |
          echo "this is an error"
          false
    - name: Verify that the previous step failed
      if: steps.testerr.outcome != 'failure'
      run: |
        echo "The step was expected to fail, but it succeeded!"
        exit 1
    - name: Verify that the previous step succeeded
      if: steps.testerr.outcome == 'failure'
      run: |
        echo "The step was expected to fail, and it failed!"
        exit 0

  test-success:
    needs: test-rsync
    runs-on: ubuntu-24.04
    name: test success handling Debian GNU/Hurd
    steps:
    - uses: actions/checkout@v6
    - name: Test in Debian GNU/Hurd
      id: testpass
      continue-on-error: true
      uses: ./
      with:
        debug: true
        run: |
          echo "this is a normal command"
          true
    - name: Verify that the previous step succeeded
      if: steps.testpass.outcome != 'success'
      run: |
        echo "The step was expected to succeed, but it failed!"
        exit 1
    - name: Verify that the previous step failed
      if: steps.testpass.outcome == 'success'
      run: |
        echo "The step was expected to succeed, and it succeeded!"
        exit 0
