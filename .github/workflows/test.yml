  test:
    strategy:
      fail-fast: false
      matrix:
        release: [ "trixie", "bookworm", "sid", ""]
        runs: [ "ubuntu-24.04"]
        disableCache: [ "", "true"]

    runs-on: ${{ matrix.runs }}
    name: rsync default Debian GNU/Hurd
    env:
      MYTOKEN : ${{ secrets.MYTOKEN }}
      MYTOKEN2: "value2"
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Check release
